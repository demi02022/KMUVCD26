  <body>
    <header class="site-header site-header-top-copy intro-board intro-board-header">
      <div class="site-header-inner site-header-simple">

    <main class="landing-page">
      <section class="calendar-shell" style="max-width: 980px; margin: 0 auto;">

            </div>
            <div class="panel-actions">

            <p class="month-summary">현재는 배포용 1차 화면이라 실시간 접수 시스템 대신 안내 페이지로 연결되어 있습니다. 제출용 폼이나 익명 제보 링크가 확정되면 바로 이 페이지에 연결할 수 있습니다.</p>
          </div>
        </article>
      </section>

    <header class="site-header site-header-footer intro-board intro-board-header">

                <circle cx="17.2" cy="6.8" r="1.2"></circle>
